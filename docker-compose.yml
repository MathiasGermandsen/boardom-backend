services:
  boardomapi:
    build:
      context: .
      dockerfile: boardomapi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:-Host=postgres;Port=5432;Database=boardomdb;Username=boardomuser;Password=TPioyXbqZOtDENdN3rvX}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - Auth0__Domain=${AUTH0_DOMAIN}
      - Auth0__Audience=${AUTH0_AUDIENCE}
      - CleanupJob__IntervalDays=${CLEANUP_INTERVAL_DAYS:-30}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - boardomapi-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: boardomdb
      POSTGRES_USER: boardomuser
      POSTGRES_PASSWORD: TPioyXbqZOtDENdN3rvX
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U boardomuser -d boardomdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boardomapi-network

volumes:
  postgres_data:


networks:
  boardomapi-network:
    driver: bridge
